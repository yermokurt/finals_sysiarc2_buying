<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request for Quotation - IT3B Inc.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../universal.css" />
  <style>
    .supplier-tag {
      background: var(--primary-light);
      color: var(--primary-color);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 3px;
    }

    .supplier-tag i {
      cursor: pointer;
    }

    .read-only-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      background: rgba(255, 255, 255, 0.5);
      display: none;
    }
  </style>
</head>

<body>
  <nav class="sidebar">
    <div class="logo-area">
      <div class="logo-icon"><i class="fa-solid fa-cube"></i></div>
      <div>
        <h6 class="mb-0 fw-bold">IT3B Inc.</h6>
        <small class="text-white-50">Sourcing Core</small>
      </div>
    </div>
    <div class="py-4">
      <a href="buying.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
      <div class="px-3 mt-4 mb-2 small text-uppercase opacity-50 fw-bold">
        Analytics
      </div>
      <a href="buying_reports.html" class="nav-link"><i class="fa-solid fa-chart-bar"></i> Reports</a>
      <div class="px-3 mt-4 mb-2 small text-uppercase opacity-50 fw-bold">
        Procurement Cycle
      </div>
      <a href="material_request_form.html" class="nav-link"><i class="fa-solid fa-file-invoice"></i> Material
        Request</a>
      <a href="rfq_form.html" class="nav-link active"><i class="fa-solid fa-magnifying-glass-dollar"></i> RFQ</a>
      <a href="supplier_quotation_form.html" class="nav-link"><i class="fa-solid fa-hand-holding-dollar"></i>
        Quotation</a>
      <a href="purchase_order_form.html" class="nav-link"><i class="fa-solid fa-file-signature"></i> Purchase Order</a>
      <div style="padding-top: 100px">
        <a href="../login.html" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="row g-4">
      <div class="col-12">
        <div class="form-card position-relative">
          <div id="readOnlyOverlay" class="read-only-overlay"></div>
          <div class="form-header d-flex justify-content-between align-items-center">
            <div>
              <h4 class="fw-bold mb-1">Request for Quotation (RFQ)</h4>
              <p class="text-muted mb-0 small">
                Distribute sourcing requests to multiple potential vendors.
              </p>
            </div>
            <span id="rfqStatusBadge" class="badge bg-secondary p-2 px-3">DRAFT</span>
          </div>
          <div class="form-body p-4">
            <form id="rfqForm" class="needs-validation" novalidate>
              <div class="row g-4">
                <div class="col-md-3">
                  <label class="form-label">RFQ ID</label>
                  <div class="input-group">
                    <input type="text" id="rfq_id" name="id" class="form-control" placeholder="BR0001" required
                      readonly />
                    <button type="button" class="btn btn-outline-primary" id="btnGenId">
                      Gen
                    </button>
                  </div>
                </div>
                <div class="col-md-5">
                  <label class="form-label">RFQ Title/Subject</label>
                  <input type="text" name="title" class="form-control" placeholder="e.g. Steel Supply for Q2"
                    required />
                </div>
                <div class="col-md-2">
                  <label class="form-label">Date</label>
                  <input type="date" name="date" class="form-control" id="rfqDate" required />
                </div>
                <div class="col-md-2">
                  <label class="form-label">Status</label>
                  <select name="status_id" id="statusSelect" class="form-select" required></select>
                </div>

                <div class="col-12">
                  <label class="form-label fw-bold">Invite Suppliers</label>
                  <div class="card p-3 bg-light">
                    <div class="row g-2 mb-3">
                      <div class="col-md-8">
                        <select id="supplierLookup" class="form-select">
                          <option value="">
                            Select a supplier to invite...
                          </option>
                        </select>
                      </div>
                      <div class="col-md-4">
                        <button type="button" class="btn btn-premium w-100" id="btnAddSupplier">
                          Add Supplier
                        </button>
                      </div>
                    </div>
                    <div id="invitedSuppliersContainer" class="d-flex flex-wrap border rounded p-2 bg-white min-vh-10"
                      style="min-height: 50px">
                      <!-- Tags go here -->
                    </div>
                  </div>
                </div>

                <div class="col-12">
                  <label class="form-label">Sourcing Notes / Remarks</label>
                  <textarea name="remarks" class="form-control" rows="2"></textarea>
                </div>
              </div>
              <div class="mt-5 d-flex justify-content-between">
                <button type="button" class="btn btn-primary px-5 py-2" id="btnReset">
                  New RFQ / Reset
                </button>
                <button type="submit" class="btn btn-primary px-5 py-2">
                  Broadcast RFQ
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-12">
        <div class="card p-4">
          <h5 class="fw-bold mb-4">RFQ Registry</h5>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Title</th>
                  <th>Date</th>
                  <th>Suppliers</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="registryTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/id_generator.js"></script>
  <script src="../js/auth_guard.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!window.Store) return;

      const form = document.getElementById("rfqForm");
      const supplierLookup = document.getElementById("supplierLookup");
      const invitedContainer = document.getElementById(
        "invitedSuppliersContainer",
      );
      const registryBody = document.getElementById("registryTableBody");
      const statusSelect = document.getElementById("statusSelect");
      const readOnlyOverlay = document.getElementById("readOnlyOverlay");

      let selectedSuppliers = [];

      // Setup UI
      const statuses = window.Store.getTable("buying_rfq_status");
      statusSelect.innerHTML = statuses
        .map((s) => `<option value="${s.id}">${s.name}</option>`)
        .join("");

      const allSuppliers = window.Store.getTable("buying_supplier");
      supplierLookup.innerHTML += allSuppliers
        .map((s) => `<option value="${s.id}">${s.name} (${s.id})</option>`)
        .join("");

      const renderTags = () => {
        invitedContainer.innerHTML = selectedSuppliers
          .map((sid) => {
            const s = allSuppliers.find((x) => x.id === sid);
            return `<span class="supplier-tag">${s.name} <i class="fa-solid fa-circle-xmark" onclick="removeSupplier('${sid}')"></i></span>`;
          })
          .join("");
      };

      window.removeSupplier = (sid) => {
        selectedSuppliers = selectedSuppliers.filter((id) => id !== sid);
        renderTags();
      };

      const renderRegistry = () => {
        const rfqs = window.Store.getTable("buying_rfq");
        const rfqSups = window.Store.getTable("buying_rfq_supplier");

        registryBody.innerHTML = rfqs
          .map((r) => {
            const status =
              statuses.find((s) => s.id === r.status_id)?.name || r.status_id;
            const count = rfqSups.filter((s) => s.rfq_id === r.id).length;
            return `
              <tr>
                <td class="fw-bold">${r.id}</td>
                <td>${r.title}</td>
                <td>${r.date}</td>
                <td><span class="badge bg-light text-dark border">${count} Invited</span></td>
                <td><span class="badge ${r.status_id === "SRQ02" ? "bg-info" : r.status_id === "SRQ03" ? "bg-dark" : "bg-primary"}">${status}</span></td>
                <td>
                  <button class="btn btn-sm btn-outline-primary btn-view" data-id="${r.id}"><i class="fa-solid fa-eye"></i></button>
                  <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${r.id}"><i class="fa-solid fa-trash"></i></button>
                </td>
              </tr>
            `;
          })
          .join("");

        document
          .querySelectorAll(".btn-view")
          .forEach((btn) =>
            btn.addEventListener("click", () => viewRFQ(btn.dataset.id)),
          );
        document
          .querySelectorAll(".btn-delete")
          .forEach((btn) =>
            btn.addEventListener("click", () => deleteRFQ(btn.dataset.id)),
          );
      };

      const viewRFQ = (id) => {
        const r = window.Store.find("buying_rfq", id);
        if (!r) return;

        form.id.value = r.id;
        form.title.value = r.title;
        form.date.value = r.date;
        form.status_id.value = r.status_id;
        form.remarks.value = r.remarks || "";

        const sups = window.Store.getTable("buying_rfq_supplier").filter(
          (s) => s.rfq_id === id,
        );
        selectedSuppliers = sups.map((s) => s.supplier_id);
        renderTags();

        if (r.status_id === "SRQ03" || r.status_id === "SRQ04") {
          readOnlyOverlay.style.display = "block";
          form.querySelector('button[type="submit"]').textContent =
            "RFQ Locked";
          form.querySelector('button[type="submit"]').disabled = true;
        } else {
          readOnlyOverlay.style.display = "none";
          form.querySelector('button[type="submit"]').textContent =
            "Update RFQ";
          form.querySelector('button[type="submit"]').disabled = false;
        }

        document.getElementById("rfqStatusBadge").textContent = statuses
          .find((s) => s.id === r.status_id)
          ?.name.toUpperCase();
        document.getElementById("btnGenId").disabled = true;
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const deleteRFQ = (id) => {
        if (confirm("Delete this RFQ?")) {
          window.Store.delete("buying_rfq", id);
          renderRegistry();
        }
      };

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (selectedSuppliers.length === 0) {
          alert("Please invite at least one supplier.");
          return;
        }
        if (!form.checkValidity()) {
          form.classList.add("was-validated");
          return;
        }

        const data = Object.fromEntries(new FormData(form).entries());
        const existing = window.Store.find("buying_rfq", data.id);

        if (existing) {
          window.Store.update("buying_rfq", data.id, data);
          const db = window.Store.getDB();
          db.buying_rfq_supplier = db.buying_rfq_supplier.filter(
            (s) => s.rfq_id !== data.id,
          );
          selectedSuppliers.forEach((sid) =>
            db.buying_rfq_supplier.push({
              id:
                "BRS" + Date.now() + Math.random().toString(36).substr(2, 3),
              rfq_id: data.id,
              supplier_id: sid,
            }),
          );
          window.Store.saveDB(db);
        } else {
          window.Store.create("buying_rfq", data);
          selectedSuppliers.forEach((sid) =>
            window.Store.create("buying_rfq_supplier", {
              id:
                "BRS" + Date.now() + Math.random().toString(36).substr(2, 3),
              rfq_id: data.id,
              supplier_id: sid,
            }),
          );
        }

        alert("RFQ successully processed.");
        resetPage();
      });

      const resetPage = () => {
        form.reset();
        selectedSuppliers = [];
        renderTags();
        readOnlyOverlay.style.display = "none";
        form.querySelector('button[type="submit"]').textContent =
          "Broadcast RFQ";
        form.querySelector('button[type="submit"]').disabled = false;
        document.getElementById("btnGenId").disabled = false;
        document.getElementById("rfqStatusBadge").textContent = "DRAFT";
        document.getElementById("rfqDate").valueAsDate = new Date();
        renderRegistry();
      };

      document.getElementById("btnGenId").addEventListener("click", () => {
        document.getElementById("rfq_id").value =
          window.IDGenerator.generate("buying_rfq");
      });
      document
        .getElementById("btnAddSupplier")
        .addEventListener("click", () => {
          const sid = supplierLookup.value;
          if (sid && !selectedSuppliers.includes(sid)) {
            selectedSuppliers.push(sid);
            renderTags();
          }
        });
      document
        .getElementById("btnReset")
        .addEventListener("click", resetPage);

      resetPage();

      // Logout handler
      document
        .querySelector('a[href="../login.html"]')
        ?.addEventListener("click", (e) => {
          e.preventDefault();
          AuthGuard.logout();
        });
    });
  </script>
</body>

</html>
