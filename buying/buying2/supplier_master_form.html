<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supplier Master - IT3B Inc.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../universal.css" />
</head>

<body>
  <nav class="sidebar">
    <div class="logo-area">
      <div class="logo-icon"><i class="fa-solid fa-cube"></i></div>
      <div>
        <h6 class="mb-0 fw-bold">IT3B Inc.</h6>
        <small class="text-white-50">Vendor Management</small>
      </div>
    </div>
    <div class="py-4">
      <a href="buying.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
      <div class="px-3 mt-4 mb-2 small text-uppercase opacity-50 fw-bold">
        Analytics
      </div>
      <a href="buying_reports.html" class="nav-link"><i class="fa-solid fa-chart-bar"></i> Reports</a>
      <div class="px-3 mt-4 mb-2 small text-uppercase opacity-50 fw-bold">
        Inventory
      </div>
      <a href="item_master_form.html" class="nav-link"><i class="fa-solid fa-box-open"></i> Item Master</a>
      <a href="supplier_master_form.html" class="nav-link active"><i class="fa-solid fa-truck-field"></i> Supplier
        Master</a>
      <div style="padding-top: 100px">
        <a href="../login.html" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="row g-4">
      <!-- Form Section -->
      <div class="col-md-5">
        <div class="form-card">
          <div class="form-header">
            <h4 class="fw-bold mb-1">Supplier Master</h4>
            <p class="text-muted mb-0 small">
              Register and manage official vendor profile records.
            </p>
          </div>
          <div class="form-body p-4">
            <form id="supplierForm" class="needs-validation" novalidate>
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">Supplier Code</label>
                  <div class="input-group">
                    <input type="text" id="supplier_id" name="id" class="form-control" placeholder="BS0001" required
                      readonly />
                    <button type="button" class="btn btn-outline-primary" id="btnGenId">
                      Generate
                    </button>
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label">Supplier Name</label>
                  <input type="text" name="name" class="form-control" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Email Address</label>
                  <input type="email" name="email" class="form-control" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" name="phone" class="form-control" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Address</label>
                  <textarea name="address" class="form-control" rows="2" required></textarea>
                </div>
              </div>
              <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1 p-2">
                  Save Supplier
                </button>
                <button type="button" class="btn btn-light" id="btnReset">
                  Reset
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Table Section -->
      <div class="col-md-7">
        <div class="card p-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">Supplier Registry</h5>
            <div class="input-group" style="width: 250px">
              <span class="input-group-text bg-transparent border-end-0"><i
                  class="fa-solid fa-magnifying-glass text-muted"></i></span>
              <input type="text" id="tableSearch" class="form-control border-start-0"
                placeholder="Search suppliers..." />
            </div>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>Code</th>
                  <th>Name</th>
                  <th>Contact</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="supplierTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/id_generator.js"></script>
  <script src="../js/auth_guard.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!window.Store) return;

      const form = document.getElementById("supplierForm");
      const tableBody = document.getElementById("supplierTableBody");
      const searchInput = document.getElementById("tableSearch");

      const renderTable = (filter = "") => {
        const suppliers = window.Store.getTable("buying_supplier");
        const filtered = suppliers.filter(
          (s) =>
            s.name.toLowerCase().includes(filter.toLowerCase()) ||
            s.id.toLowerCase().includes(filter.toLowerCase()),
        );

        tableBody.innerHTML = filtered
          .map(
            (s) => `
            <tr>
              <td class="fw-bold">${s.id}</td>
              <td>${s.name}</td>
              <td><small>${s.email}<br>${s.phone}</small></td>
              <td>
                <div class="btn-group">
                  <button class="btn btn-sm btn-outline-primary btn-edit" data-id="${s.id}"><i class="fa-solid fa-pen"></i></button>
                  <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${s.id}"><i class="fa-solid fa-trash"></i></button>
                </div>
              </td>
            </tr>
          `,
          )
          .join("");

        // Actions
        document.querySelectorAll(".btn-edit").forEach((btn) => {
          btn.addEventListener("click", () => editSupplier(btn.dataset.id));
        });
        document.querySelectorAll(".btn-delete").forEach((btn) => {
          btn.addEventListener("click", () => deleteSupplier(btn.dataset.id));
        });
      };

      const editSupplier = (id) => {
        const supplier = window.Store.find("buying_supplier", id);
        if (supplier) {
          form.id.value = supplier.id;
          form.name.value = supplier.name;
          form.email.value = supplier.email;
          form.phone.value = supplier.phone;
          form.address.value = supplier.address;
          document.getElementById("btnGenId").disabled = true;
        }
      };

      const deleteSupplier = (id) => {
        if (
          confirm(
            "Are you sure you want to delete this supplier? This will also remove their associated data.",
          )
        ) {
          window.Store.delete("buying_supplier", id);
          renderTable();
        }
      };

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (!form.checkValidity()) {
          form.classList.add("was-validated");
          return;
        }

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        const existing = window.Store.find("buying_supplier", data.id);
        if (existing) {
          window.Store.update("buying_supplier", data.id, data);
        } else {
          window.Store.create("buying_supplier", data);
        }

        form.reset();
        form.classList.remove("was-validated");
        document.getElementById("btnGenId").disabled = false;
        renderTable();
        alert("Supplier saved successfully!");
      });

      document.getElementById("btnGenId").addEventListener("click", () => {
        document.getElementById("supplier_id").value =
          window.IDGenerator.generate("buying_supplier");
      });

      document.getElementById("btnReset").addEventListener("click", () => {
        form.reset();
        document.getElementById("btnGenId").disabled = false;
      });

      searchInput.addEventListener("input", (e) =>
        renderTable(e.target.value),
      );

      // Initial Load
      renderTable();

      // Logout handler
      document
        .querySelector('a[href="../login.html"]')
        ?.addEventListener("click", (e) => {
          e.preventDefault();
          AuthGuard.logout();
        });
    });
  </script>
</body>

</html>
