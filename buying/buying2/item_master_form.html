<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Master - IT3B Inc.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../universal.css" />
</head>

<body>
  <nav class="sidebar">
    <div class="logo-area">
      <div class="logo-icon"><i class="fa-solid fa-cube"></i></div>
      <div>
        <h6 class="mb-0 fw-bold">IT3B Inc.</h6>
        <small class="text-white-50">Inventory System</small>
      </div>
    </div>
    <div class="py-4">
      <a href="buying.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
      <div class="px-3 mt-4 mb-2 small text-uppercase opacity-50 fw-bold">
        Analytics
      </div>
      <a href="buying_reports.html" class="nav-link"><i class="fa-solid fa-chart-bar"></i> Reports</a>
      <div class="px-3 mt-4 mb-2 small text-uppercase opacity-50 fw-bold">
        Inventory
      </div>
      <a href="item_master_form.html" class="nav-link active"><i class="fa-solid fa-box-open"></i> Item Master</a>
      <a href="supplier_master_form.html" class="nav-link"><i class="fa-solid fa-truck-field"></i> Supplier Master</a>
      <div style="padding-top: 100px">
        <a href="../login.html" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="row g-4">
      <div class="col-md-5">
        <div class="form-card">
          <div class="form-header">
            <h4 class="fw-bold mb-1">Item (Master Record)</h4>
            <p class="text-muted mb-0 small">
              Create or update fundamental material/product details.
            </p>
          </div>
          <div class="form-body p-4">
            <form id="itemForm" class="needs-validation" novalidate>
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">Item ID</label>
                  <input type="text" name="id" class="form-control" placeholder="ITEM0001" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Item Name</label>
                  <input type="text" name="name" class="form-control" placeholder="Enter descriptive name" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Default Unit Price ($)</label>
                  <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required />
                </div>
              </div>
              <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1">
                  Save Item
                </button>
                <button type="reset" class="btn btn-light" id="btnReset">
                  Reset
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-7">
        <div class="card p-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">Item Registry</h5>
            <input type="text" id="tableSearch" class="form-control" placeholder="Search items..."
              style="width: 200px" />
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Price</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="itemTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth_guard.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!window.Store) return;

      const form = document.getElementById("itemForm");
      const tableBody = document.getElementById("itemTableBody");
      const searchInput = document.getElementById("tableSearch");

      const renderTable = (filter = "") => {
        const items = window.Store.getTable("buying_items");
        const filtered = items.filter(
          (i) =>
            i.name.toLowerCase().includes(filter.toLowerCase()) ||
            i.id.toLowerCase().includes(filter.toLowerCase()),
        );

        tableBody.innerHTML = filtered
          .map(
            (i) => `
            <tr>
              <td class="fw-bold">${i.id}</td>
              <td>${i.name}</td>
              <td>$${parseFloat(i.price).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
              <td>
                <div class="btn-group">
                  <button class="btn btn-sm btn-outline-primary btn-edit" data-id="${i.id}"><i class="fa-solid fa-pen"></i></button>
                  <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${i.id}"><i class="fa-solid fa-trash"></i></button>
                </div>
              </td>
            </tr>
          `,
          )
          .join("");

        document.querySelectorAll(".btn-edit").forEach((btn) => {
          btn.addEventListener("click", () => {
            const item = window.Store.find("buying_items", btn.dataset.id);
            if (item) {
              form.id.value = item.id;
              form.name.value = item.name;
              form.price.value = item.price;
            }
          });
        });

        document.querySelectorAll(".btn-delete").forEach((btn) => {
          btn.addEventListener("click", () => {
            if (confirm("Delete this item?")) {
              window.Store.delete("buying_items", btn.dataset.id);
              renderTable();
            }
          });
        });
      };

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (!form.checkValidity()) {
          form.classList.add("was-validated");
          return;
        }

        const data = Object.fromEntries(new FormData(form).entries());
        const existing = window.Store.find("buying_items", data.id);

        if (existing) {
          window.Store.update("buying_items", data.id, data);
        } else {
          window.Store.create("buying_items", data);
        }

        form.reset();
        form.classList.remove("was-validated");
        renderTable();
        alert("Item saved successfully!");
      });

      searchInput.addEventListener("input", (e) =>
        renderTable(e.target.value),
      );

      renderTable();

      // Logout handler
      document
        .querySelector('a[href="../login.html"]')
        ?.addEventListener("click", (e) => {
          e.preventDefault();
          AuthGuard.logout();
        });
    });
  </script>
</body>

</html>
