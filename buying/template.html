<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Module Template - IT3B Inc.</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="universal.css" id="universalStyles" />
  <style>
    /* Component-specific overrides can go here */
  </style>
</head>

<body>
  <!-- Sidebar -->
  <nav class="sidebar" id="mainSidebar">
    <div class="logo-area">
      <div class="logo-icon"><i class="fa-solid fa-cube"></i></div>
      <div>
        <h6 class="mb-0 fw-bold">IT3B Inc.</h6>
        <small class="text-white-50" id="moduleSubtitle">Enterprise Edition</small>
      </div>
    </div>
    <div class="py-4" id="sidebarNav">
      <!-- JS will populate links here -->
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="header-section mb-4" id="pageHeader">
      <!-- JS will populate header here -->
    </div>

    <div id="mainContentArea">
      <!-- Content Area -->
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth_guard.js"></script>

  <script>
    /**
     * Template Helper for IT3B ERP - Decoupled UI
     */
    const UI = {
      init(config) {
        // Adjust paths based on folder depth
        const isSubfolder = window.location.pathname.includes("/buying/");
        const prefix = isSubfolder ? "../" : "./";
        document.getElementById("universalStyles").href =
          prefix + "universal.css";

        // Render Sidebar
        const nav = document.getElementById("sidebarNav");
        nav.innerHTML = config.menu
          .map(
            (item) => `
            ${item.type === "label"
                ? `<div class="nav-group-label">${item.text}</div>`
                : `<a href="${prefix}${item.link}" class="nav-link ${window.location.pathname.endsWith(item.link) ? "active" : ""}">
                <i class="${item.icon}"></i> ${item.text}
              </a>`
              }
          `,
          )
          .join("");

        // Add Logout at bottom
        nav.innerHTML += `
            <div style="padding-top: 50px;">
                <a href="#" onclick="AuthGuard.logout()" class="nav-link text-danger">
                  <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                </a>
            </div>
          `;

        // Render Header
        document.getElementById("pageHeader").innerHTML = `
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <h2 class="fw-bold">${config.title}</h2>
                <p class="text-muted">${config.description}</p>
              </div>
            </div>
          `;
      },
    };

    // Example usage within a page:
    /*
    UI.init({
      title: 'Material Request',
      description: 'Manage internal requisitions',
      menu: [
          { type: 'label', text: 'Navigation' },
          { type: 'link', text: 'Dashboard', link: 'buying/buying.html', icon: 'fa-solid fa-gauge' },
          { type: 'label', text: 'Core' },
          { type: 'link', text: 'Items', link: 'buying/item_master_form.html', icon: 'fa-solid fa-box' }
      ]
    });
    */
  </script>
</body>

</html>
