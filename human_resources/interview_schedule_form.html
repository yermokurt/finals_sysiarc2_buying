<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Schedule - IT3B Inc.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      :root {
        --primary-color: #2563eb;
        --sidebar-bg: #1e293b;
        --bg-color: #badcfd;
        --text-dark: #1e293b;
        --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--bg-color);
        min-height: 100vh;
        margin: 0;
        display: flex;
      }
      .sidebar { width: 280px; background: var(--sidebar-bg); height: 100vh; position: fixed; color: white; display: flex; flex-direction: column; z-index: 1000; }
      .logo-area { padding: 2rem 1.5rem; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
      .logo-icon { width: 35px; height: 35px; background: white; color: var(--primary-color); border-radius: 8px; display: grid; place-items: center; font-size: 1rem; }
      .nav-link { padding: 0.8rem 1.5rem; color: rgba(255, 255, 255, 0.6); display: flex; align-items: center; gap: 12px; font-weight: 500; transition: all 0.2s; text-decoration: none; }
      .nav-link:hover { color: white; background: rgba(255, 255, 255, 0.05); }
      .nav-link.active { color: white; background: var(--primary-color); border-radius: 0 50px 50px 0; margin-right: 1.5rem; }
      
      .main-content { margin-left: 280px; padding: 2.5rem; flex: 1; }
      .form-card { background: white; border-radius: 24px; box-shadow: var(--card-shadow); border: none; overflow: hidden; margin-bottom: 2rem; }
      .form-header { background: #f8fafc; padding: 2rem; border-bottom: 1px solid #e2e8f0; }
      .form-body { padding: 2.5rem; }
      
      .section-divider { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary-color); font-weight: 700; margin: 1.5rem 0; display: flex; align-items: center; gap: 10px; }
      .section-divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; }

      .badge-scheduled { background-color: #0ea5e9; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
      .btn-view { color: var(--primary-color); border: 1px solid var(--primary-color); background: transparent; padding: 4px 12px; border-radius: 8px; font-size: 0.85rem; transition: all 0.2s; }
      .btn-view:hover { background: var(--primary-color); color: white; }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <div class="logo-area">
        <div class="logo-icon"><i class="fa-solid fa-calendar-check"></i></div>
        <div>
          <h6 class="mb-0 fw-bold">IT3B Inc.</h6>
          <small class="text-white-50">HR Management</small>
        </div>
      </div>
      <div class="py-4">
        <a href="hr_dashboard.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
        <div class="px-3 mt-4 mb-2 small text-uppercase opacity-50 fw-bold">Talent Operations</div>
        <a href="job_application_form.html" class="nav-link"><i class="fa-solid fa-user-pen"></i> Job Application</a>
        <a href="interview_schedule_form.html" class="nav-link active"><i class="fa-solid fa-clock"></i> Interview Schedule</a>
      </div>
    </nav>

    <main class="main-content">
      <div class="form-card">
        <div class="form-header">
          <h4 class="fw-bold mb-1">Schedule Interview</h4>
          <p class="text-muted mb-0 small">Coordinate assessment rounds for candidates.</p>
        </div>
        <div class="form-body">
          <form id="interviewForm" class="needs-validation" novalidate>
            <div class="section-divider">Candidate & Round Info</div>
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label">Candidate</label>
                <select id="candidateSelect" class="form-select" required>
                  <option value="" selected disabled>Select candidate...</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Interview Round</label>
                <select id="interviewRound" class="form-select" required>
                  <option>Initial Screening</option>
                  <option>Technical Assessment</option>
                  <option>Management / Culture Fit</option>
                  <option>Final HR Round</option>
                </select>
              </div>
            </div>

            <div class="section-divider">Logistics</div>
            <div class="row g-4">
              <div class="col-md-4">
                <label class="form-label">Date</label>
                <input type="date" id="intDate" class="form-control" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Start Time</label>
                <input type="time" id="intTime" class="form-control" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Duration</label>
                <select id="intDuration" class="form-select">
                  <option>30 Minutes</option>
                  <option selected>1 Hour</option>
                  <option>1.5 Hours</option>
                  <option>2 Hours</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Interview Type</label>
                <select id="intType" class="form-select" required>
                  <option>Video Call (Google Meet/Zoom)</option>
                  <option>In-Person Office Visit</option>
                  <option>Phone Call</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Meeting Link / Room No.</label>
                <input type="text" id="intLocation" class="form-control" placeholder="URL or Office Room" required />
              </div>
            </div>

            <div class="section-divider">Interview Panel</div>
            <div class="row g-4">
              <div class="col-12">
                <label class="form-label">Interviewer(s)</label>
                <input type="text" id="intPanel" class="form-control" placeholder="e.g. John Doe, Sarah Tech" required />
              </div>
            </div>

            <div class="mt-5 d-flex justify-content-end gap-3">
              <button type="reset" class="btn btn-light px-4 py-2 fw-bold" style="border-radius: 12px">Reset</button>
              <button type="submit" class="btn btn-primary px-5 py-2 fw-bold" style="border-radius: 12px">Confirm Schedule</button>
            </div>
          </form>
        </div>
      </div>

      <div class="form-card">
        <div class="form-body">
          <h5 class="fw-bold mb-3">Scheduled Interviews</h5>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead class="bg-light">
                <tr class="small text-uppercase fw-bold text-muted">
                  <th>Candidate</th>
                  <th>Round</th>
                  <th>Date & Time</th>
                  <th>Type</th>
                  <th class="text-end">Action</th>
                </tr>
              </thead>
              <tbody id="interviewTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: none;">
          <div class="modal-header border-0 pt-4 px-4">
            <h5 class="fw-bold mb-0">Interview Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4" id="modalContent">
            </div>
          <div class="modal-footer border-0 pb-4 px-4">
            <button type="button" class="btn btn-light w-100 fw-bold" style="border-radius: 12px" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Load Data from LocalStorage
    let interviewDb = JSON.parse(localStorage.getItem('hr_interviews')) || [];
    let applicationDb = JSON.parse(localStorage.getItem('hr_applications')) || [];
    const bootstrapModal = new bootstrap.Modal(document.getElementById('detailsModal'));

    window.onload = () => {
        populateCandidates();
        renderInterviewTable();
    };

    // Populate Candidate dropdown from Application Database
    function populateCandidates() {
        const select = document.getElementById("candidateSelect");
        // Clear existing options except the placeholder
        select.innerHTML = '<option value="" selected disabled>Select candidate...</option>';
        
        if (applicationDb.length === 0) {
            const opt = document.createElement("option");
            opt.textContent = "No applications found";
            opt.disabled = true;
            select.appendChild(opt);
        } else {
            applicationDb.forEach(app => {
                const opt = document.createElement("option");
                opt.value = app.name;
                opt.textContent = app.name;
                select.appendChild(opt);
            });
        }
    }

    function renderInterviewTable() {
        const tableBody = document.getElementById("interviewTableBody");
        tableBody.innerHTML = "";
        
        interviewDb.forEach((item, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td class="fw-medium">${item.candidate}</td>
                <td class="small">${item.round}</td>
                <td class="small">${item.date} <br> <span class="text-muted">${item.time} (${item.duration})</span></td>
                <td class="small">${item.type}</td>
                <td class="text-end">
                    <button class="btn-view" onclick="viewDetails(${index})">View</button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    function viewDetails(index) {
        const item = interviewDb[index];
        document.getElementById("modalContent").innerHTML = `
            <div class="mb-4">
                <label class="text-muted small d-block">Candidate</label>
                <h5 class="fw-bold">${item.candidate}</h5>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-6">
                    <label class="text-muted small d-block">Round</label>
                    <span class="fw-semibold">${item.round}</span>
                </div>
                <div class="col-6">
                    <label class="text-muted small d-block">Duration</label>
                    <span class="fw-semibold">${item.duration}</span>
                </div>
                <div class="col-6">
                    <label class="text-muted small d-block">Date</label>
                    <span class="fw-semibold">${item.date}</span>
                </div>
                <div class="col-6">
                    <label class="text-muted small d-block">Time</label>
                    <span class="fw-semibold">${item.time}</span>
                </div>
            </div>
            <div class="p-3 bg-light rounded-3 mb-3">
                <label class="text-muted small d-block">Meeting Link / Location</label>
                <a href="${item.location.includes('http') ? item.location : '#'}" target="_blank" class="text-primary fw-bold text-break">${item.location}</a>
            </div>
            <div>
                <label class="text-muted small d-block">Panel Members</label>
                <span class="fw-medium text-dark">${item.panel}</span>
            </div>
        `;
        bootstrapModal.show();
    }

    document.getElementById("interviewForm").onsubmit = (e) => {
        e.preventDefault();
        const form = e.target;
        
        if (form.checkValidity()) {
            const newInterview = {
                candidate: document.getElementById("candidateSelect").value,
                round: document.getElementById("interviewRound").value,
                date: document.getElementById("intDate").value,
                time: document.getElementById("intTime").value,
                duration: document.getElementById("intDuration").value,
                type: document.getElementById("intType").value,
                location: document.getElementById("intLocation").value,
                panel: document.getElementById("intPanel").value
            };

            // Save to DB
            interviewDb.push(newInterview);
            localStorage.setItem('hr_interviews', JSON.stringify(interviewDb));
            
            // UI Updates
            renderInterviewTable();
            alert("Interview Scheduled Successfully!");
            
            // --- CLEAR FORM LOGIC ---
            form.reset(); // Resets values
            form.classList.remove("was-validated"); // Removes Bootstrap validation styling
            document.getElementById("candidateSelect").selectedIndex = 0; // Ensures dropdown resets to placeholder
        } else {
            form.classList.add("was-validated");
        }
    };
</script>
  </body>
</html>
