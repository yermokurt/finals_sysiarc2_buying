<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Performance Review - IT3B Inc.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      :root {
        --primary-color: #2563eb;
        --sidebar-bg: #1e293b;
        --bg-color: #badcfd;
        --text-dark: #1e293b;
        --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--bg-color);
        min-height: 100vh;
        margin: 0;
        display: flex;
      }
      .sidebar { width: 280px; background: var(--sidebar-bg); height: 100vh; position: fixed; color: white; display: flex; flex-direction: column; z-index: 1000; }
      .logo-area { padding: 2rem 1.5rem; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
      .logo-icon { width: 35px; height: 35px; background: white; color: var(--primary-color); border-radius: 8px; display: grid; place-items: center; font-size: 1rem; }
      .nav-link { padding: 0.8rem 1.5rem; color: rgba(255, 255, 255, 0.6); display: flex; align-items: center; gap: 12px; font-weight: 500; transition: all 0.2s; text-decoration: none; }
      .nav-link:hover { color: white; background: rgba(255, 255, 255, 0.05); }
      .nav-link.active { color: white; background: var(--primary-color); border-radius: 0 50px 50px 0; margin-right: 1.5rem; }
      
      .main-content { margin-left: 280px; padding: 2.5rem; flex: 1; }
      .form-card { background: white; border-radius: 24px; box-shadow: var(--card-shadow); border: none; overflow: hidden; margin-bottom: 2rem; }
      .form-header { background: #f8fafc; padding: 2rem; border-bottom: 1px solid #e2e8f0; }
      .form-body { padding: 2.5rem; }
      
      .form-label { font-weight: 600; color: var(--text-dark); margin-bottom: 0.5rem; font-size: 0.9rem; }
      .form-control, .form-select { border-radius: 12px; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; }
      
      .btn-primary { background: var(--primary-color); border: none; padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 600; }
      .section-divider { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary-color); font-weight: 700; margin: 1.5rem 0; display: flex; align-items: center; gap: 10px; }
      .section-divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; }
      
      .rating-info { font-size: 0.8rem; background: #f1f5f9; padding: 10px; border-radius: 8px; margin-bottom: 1rem; }
      .badge-score { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-weight: 700; }
      
      /* View Modal Styling */
      .modal-content { border-radius: 24px; border: none; }
      .modal-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 1.5rem 2rem; }
      .score-box { background: #f8fafc; padding: 1rem; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <div class="logo-area">
        <div class="logo-icon"><i class="fa-solid fa-chart-line"></i></div>
        <div>
          <h6 class="mb-0 fw-bold">IT3B Inc.</h6>
          <small class="text-white-50">HR Management</small>
        </div>
      </div>
      <div class="py-4">
        <a href="hr_dashboard.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
        <div class="px-3 mt-4 mb-2 small text-uppercase opacity-50 fw-bold">Management</div>
        <a href="performance_form.html" class="nav-link active"><i class="fa-solid fa-star"></i> Performance Review</a>
        <a href="employee_master_form.html" class="nav-link"><i class="fa-solid fa-id-card"></i> Employee Master</a>
      </div>
    </nav>

    <main class="main-content">
      <div class="form-card">
        <div class="form-header">
          <h4 class="fw-bold mb-1">Performance Appraisal Form</h4>
          <p class="text-muted mb-0 small">Evaluate employee goals and provide feedback.</p>
        </div>
        <div class="form-body">
          <form id="performanceForm" class="needs-validation" novalidate>
            <div class="section-divider">Review Context</div>
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label">Employee</label>
                <select id="empSelect" class="form-select" required>
                  <option value="" selected disabled>Select Employee...</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Review Period</label>
                <select id="period" class="form-select" required>
                  <option>Annual Review 2026</option>
                  <option>Mid-Year Review 2026</option>
                  <option>Probationary Review</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Review Date</label>
                <input type="date" id="revDate" class="form-control" required />
              </div>
            </div>

            <div class="section-divider">Competency Rating (1-5)</div>
            <div class="row g-4">
              <div class="col-md-4">
                <label class="form-label">Job Knowledge</label>
                <input type="number" id="scoreJob" class="form-control" min="1" max="5" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Work Quality</label>
                <input type="number" id="scoreQuality" class="form-control" min="1" max="5" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Teamwork</label>
                <input type="number" id="scoreTeam" class="form-control" min="1" max="5" required />
              </div>
              <div class="col-12">
                <label class="form-label">Key Achievements</label>
                <textarea id="achievements" class="form-control" rows="2" required></textarea>
              </div>
            </div>

            <div class="mt-4 d-flex justify-content-end gap-3">
              <button type="reset" class="btn btn-light px-4">Clear</button>
              <button type="submit" class="btn btn-primary px-5">Finalize Review</button>
            </div>
          </form>
        </div>
      </div>

      <div class="form-card mt-4">
        <div class="form-body">
          <h5 class="fw-bold mb-3">Historical Performance Reviews</h5>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead class="bg-light">
                <tr class="small text-uppercase fw-bold text-muted">
                  <th>Employee</th>
                  <th>Period</th>
                  <th>Date</th>
                  <th>Avg Score</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="performanceTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="viewReviewModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="fw-bold mb-0">Appraisal Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4" id="modalContent">
            </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      let performanceDb = JSON.parse(localStorage.getItem('hr_performance')) || [];
      let empDb = JSON.parse(localStorage.getItem('hr_employee_records')) || [];
      const viewModal = new bootstrap.Modal(document.getElementById('viewReviewModal'));

      window.onload = () => {
        populateEmployees();
        renderTable();
        document.getElementById('revDate').valueAsDate = new Date();
      };

      function populateEmployees() {
        const select = document.getElementById("empSelect");
        select.innerHTML = '<option value="" selected disabled>Select Employee...</option>';
        empDb.forEach(emp => {
          const opt = document.createElement("option");
          opt.value = emp.name;
          opt.textContent = `[${emp.id}] ${emp.name}`;
          select.appendChild(opt);
        });
      }

      function renderTable() {
    const tbody = document.getElementById("performanceTableBody");
    tbody.innerHTML = "";
    
    performanceDb.forEach((rev, index) => {
      const avg = ((rev.s1 + rev.s2 + rev.s3) / 3).toFixed(1);
      
      tbody.innerHTML += `
        <tr>
          <td>
            <div class="fw-bold text-dark">${rev.name}</div>
            <small class="text-muted">${rev.notes.substring(0, 30)}...</small>
          </td>
          <td class="small">${rev.period}</td>
          <td class="small">${rev.date}</td>
          <td><span class="badge-score">${avg} / 5.0</span></td>
          <td class="text-end">
            <button class="btn btn-outline-primary btn-sm px-3 rounded-3 me-2" onclick="viewRecord(${index})">
              View
            </button>
          </td>
        </tr>`;
    });
  }

      function viewRecord(index) {
        const rev = performanceDb[index];
        const avg = ((rev.s1 + rev.s2 + rev.s3) / 3).toFixed(1);
        
        document.getElementById('modalContent').innerHTML = `
          <div class="row g-4">
            <div class="col-md-6">
              <label class="text-muted small text-uppercase fw-bold">Employee</label>
              <p class="fw-bold h5 text-primary">${rev.name}</p>
            </div>
            <div class="col-md-6 text-md-end">
              <label class="text-muted small text-uppercase fw-bold">Review Period</label>
              <p class="fw-bold">${rev.period}</p>
            </div>
            <div class="col-12"><hr></div>
            <div class="col-md-4">
              <div class="score-box">
                <label class="small text-muted d-block">Job Knowledge</label>
                <span class="h4 fw-bold">${rev.s1}</span>
              </div>
            </div>
            <div class="col-md-4">
              <div class="score-box">
                <label class="small text-muted d-block">Work Quality</label>
                <span class="h4 fw-bold">${rev.s2}</span>
              </div>
            </div>
            <div class="col-md-4">
              <div class="score-box">
                <label class="small text-muted d-block">Teamwork</label>
                <span class="h4 fw-bold">${rev.s3}</span>
              </div>
            </div>
            <div class="col-12 mt-4 text-center">
               <span class="badge-score py-2 px-4 h5">Overall Average: ${avg} / 5.0</span>
            </div>
            <div class="col-12 mt-3">
              <label class="text-muted small text-uppercase fw-bold">Key Achievements</label>
              <div class="p-3 bg-light rounded-3 mt-1">${rev.notes}</div>
            </div>
          </div>
        `;
        viewModal.show();
      }

      document.getElementById("performanceForm").onsubmit = (e) => {
        e.preventDefault();
        const form = e.target;
        if (form.checkValidity()) {
          const newReview = {
            name: document.getElementById("empSelect").value,
            period: document.getElementById("period").value,
            date: document.getElementById("revDate").value,
            s1: parseInt(document.getElementById("scoreJob").value),
            s2: parseInt(document.getElementById("scoreQuality").value),
            s3: parseInt(document.getElementById("scoreTeam").value),
            notes: document.getElementById("achievements").value
          };
          performanceDb.push(newReview);
          localStorage.setItem('hr_performance', JSON.stringify(performanceDb));
          renderTable();
          form.reset();
          form.classList.remove("was-validated");
          document.getElementById('revDate').valueAsDate = new Date();
          alert("Performance record successfully saved.");
        } else {
          form.classList.add("was-validated");
        }
      };
    </script>
  </body>
</html>
