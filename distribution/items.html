<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items Master - IT3B Inc.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Reused Variables & Layout Styles --- */
        :root {
            --sidebar-bg: #1e293b;
            --sidebar-text: #94a3b8;
            --sidebar-text-active: #ffffff;
            --primary-blue: #2563eb;
            --content-bg: #eef2f6;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --danger-red: #ef4444;
            --success-green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background-color: var(--content-bg); }

        /* Sidebar Styles */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .brand { display: flex; align-items: center; margin-bottom: 40px; color: var(--sidebar-text-active); }
        .brand-icon { font-size: 24px; margin-right: 10px; }
        .brand-text h1 { font-size: 16px; font-weight: 700; }
        .brand-text p { font-size: 10px; opacity: 0.7; }
        .menu-group-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; margin-top: 20px; font-weight: 600; }
        .nav-link { display: flex; align-items: center; text-decoration: none; color: var(--sidebar-text); padding: 12px 15px; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; font-size: 14px; font-weight: 500; }
        .nav-link i { margin-right: 15px; font-size: 16px; width: 20px; text-align: center; }
        .nav-link:hover { background-color: rgba(255,255,255,0.05); color: var(--sidebar-text-active); }
        .nav-link.active { background-color: var(--primary-blue); color: white; }
        .text-danger { color: var(--danger-red); }
        .text-danger:hover { background-color: rgba(239, 68, 68, 0.1); color: var(--danger-red); }

        /* Main Content */
        .main-content { flex: 1; padding: 30px 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h2 { font-size: 24px; color: var(--text-dark); font-weight: 700; }
        .header p { color: var(--text-muted); font-size: 14px; }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 500; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background-color: var(--primary-blue); color: white; }
        .btn-primary:hover { background-color: #1d4ed8; }

        /* Table Card */
        .card { background-color: var(--card-bg); border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow: hidden; }
        .table-toolbar { padding: 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .search-box { padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 8px; width: 300px; outline: none; }
        
        .data-table { width: 100%; border-collapse: collapse; text-align: left; }
        .data-table th { background-color: #f8fafc; color: var(--text-muted); font-weight: 600; font-size: 12px; padding: 15px 20px; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
        .data-table td { padding: 15px 20px; border-bottom: 1px solid #e2e8f0; color: var(--text-dark); font-size: 14px; }
        .data-table tr:hover { background-color: #f8fafc; }
        
        /* Action Buttons in Table */
        .action-icon-btn { background: none; border: none; cursor: pointer; font-size: 16px; margin-right: 10px; transition: 0.2s; }
        .edit-btn { color: var(--primary-blue); }
        .edit-btn:hover { color: #1e3a8a; }
        .delete-btn { color: var(--danger-red); }
        .delete-btn:hover { color: #b91c1c; }

        /* Modal Styles for Form */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.6); align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background-color: var(--card-bg); width: 450px; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .modal-header { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-weight: 600; color: var(--text-dark); }
        .close-btn { cursor: pointer; color: var(--text-muted); font-size: 20px; }
        .modal-body { padding: 20px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 500; color: var(--text-dark); }
        .form-control { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; }
        .form-control:focus { border-color: var(--primary-blue); }
        .modal-footer { padding: 20px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 10px; background-color: #f8fafc; }
        .btn-secondary { background-color: white; border: 1px solid #e2e8f0; color: var(--text-dark); }
        .btn-secondary:hover { background-color: #f1f5f9; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-cube"></i></div>
            <div class="brand-text"><h1>IT3B Inc.</h1><p>Supply Chain Management</p></div>
        </div>

        <div class="menu-group-label">Core Dashboard</div>
        <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-pie"></i> Overview</a>

        <div class="menu-group-label">Distribution Data</div>
        <a href="items.html" class="nav-link active"><i class="fas fa-box-open"></i> Items Master</a>
        <a href="warehouses.html" class="nav-link"><i class="fas fa-warehouse"></i> Warehouses</a>

        <div class="menu-group-label">Operations</div>
        <a href="stock.html" class="nav-link"><i class="fas fa-chart-line"></i> Stock Balance</a>
        <a href="receipts.html" class="nav-link"><i class="fas fa-file-invoice-dollar"></i> Purchase Receipts</a>
        <a href="delivery.html" class="nav-link"><i class="fas fa-truck-fast"></i> Delivery Notes</a>

        <a href="../login.html" class="nav-link text-danger" style="margin-top: auto;">
            <i class="fa-solid fa-right-from-bracket"></i> Sign Out
        </a>
    </nav>

    <main class="main-content">
        <div class="header">
            <div>
                <h2>Items Master</h2>
                <p>Manage all registered distribution items.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add New Item</button>
        </div>

        <div class="card">
            <div class="table-toolbar">
                <input type="text" class="search-box" placeholder="Search items..." id="searchInput" onkeyup="filterTable()">
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Item Code</th>
                        <th>Item Name</th>
                        <th>Category</th>
                        <th>Warehouse</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="itemsTableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Add New Item</h3>
                <i class="fas fa-times close-btn" onclick="closeModal()"></i>
            </div>
            <div class="modal-body">
                <form id="itemForm">
                    <input type="hidden" id="editItemId">
                    <div class="form-group">
                        <label>Item Name</label>
                        <input type="text" id="itemName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="itemCategory" class="form-control" required>
                            <option value="Electronics">Electronics</option>
                            <option value="Office Supplies">Office Supplies</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Tools">Tools</option>
                        </select>
                    </div>
<div class="form-group">
                        <label>Assigned Warehouse</label>
                        <select id="itemWarehouse" class="form-control" required>
                            </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
            </div>
        </div>
    </div>

<script>
        // --- 1. Load Initial Items Data ---
        let itemsData = JSON.parse(localStorage.getItem('it3b_items'));

        if (!itemsData || itemsData.length === 0) {
            itemsData = [
                { id: 'ITM-1001', name: 'MacBook Pro 16"', category: 'Electronics', warehouse: 'Central Warehouse' },
                { id: 'ITM-1002', name: 'Ergonomic Chair', category: 'Furniture', warehouse: 'East Coast Depot' },
                { id: 'ITM-1003', name: 'A4 Paper Bundle', category: 'Office Supplies', warehouse: 'West Coast Hub' }
            ];
            localStorage.setItem('it3b_items', JSON.stringify(itemsData));
        }

        // --- Helper: Find the lowest missing Item ID ---
        function getNextAvailableId() {
            if (itemsData.length === 0) return 'ITM-1001';
            const existingNumbers = itemsData.map(item => parseInt(item.id.replace('ITM-', ''))).sort((a, b) => a - b);
            let nextNumber = 1001;
            for (let i = 0; i < existingNumbers.length; i++) {
                if (existingNumbers[i] === nextNumber) { nextNumber++; } 
                else if (existingNumbers[i] > nextNumber) { break; }
            }
            return 'ITM-' + nextNumber;
        }

        // --- 2. Dynamically Load Warehouses for Dropdown ---
        function loadWarehouseOptions() {
            const whSelect = document.getElementById('itemWarehouse');
            let whData = JSON.parse(localStorage.getItem('it3b_warehouses'));
            
            // Failsafe: Create default warehouses if memory is empty
            if (!whData || whData.length === 0) {
                whData = [
                    { id: 'WH-1001', name: 'Central Warehouse', location: 'New York' },
                    { id: 'WH-1002', name: 'East Coast Depot', location: 'Boston' },
                    { id: 'WH-1003', name: 'West Coast Hub', location: 'Los Angeles' }
                ];
                localStorage.setItem('it3b_warehouses', JSON.stringify(whData));
            }
            
            // Build the HTML string completely first (prevents browser visual glitches)
            let optionsHTML = '';
            whData.forEach(wh => {
                // Ensure name isn't blank
                if(wh.name) {
                    optionsHTML += `<option value="${wh.name}">${wh.name}</option>`;
                }
            });
            optionsHTML += '<option value="Unassigned">Unassigned</option>';
            
            // Inject it all at once
            whSelect.innerHTML = optionsHTML;
        }

        // --- 3. Render Items Table ---
        function renderTable() {
            const tbody = document.getElementById('itemsTableBody');
            tbody.innerHTML = ''; 
            
            itemsData.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${item.id}</strong></td>
                        <td>${item.name}</td>
                        <td>${item.category}</td>
                        <td>${item.warehouse}</td>
                        <td>
                            <button class="action-icon-btn edit-btn" onclick="editItem('${item.id}')" title="Edit"><i class="fas fa-edit"></i></button>
                            <button class="action-icon-btn delete-btn" onclick="deleteItem('${item.id}')" title="Delete"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        // --- 4. Add/Edit Functions ---
        const modal = document.getElementById('itemModal');
        const modalTitle = document.getElementById('modalTitle');

        function openModal() {
            document.getElementById('itemForm').reset();
            document.getElementById('editItemId').value = '';
            modalTitle.innerText = "Add New Item";
            loadWarehouseOptions(); // Load latest warehouses!
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function saveItem() {
            const idInput = document.getElementById('editItemId').value;
            const name = document.getElementById('itemName').value;
            const category = document.getElementById('itemCategory').value;
            const warehouse = document.getElementById('itemWarehouse').value;

            if(!name) { alert("Please enter an item name."); return; }

            if (idInput) {
                // Edit existing
                const index = itemsData.findIndex(i => i.id === idInput);
                if(index !== -1) {
                    itemsData[index].name = name;
                    itemsData[index].category = category;
                    itemsData[index].warehouse = warehouse;
                }
            } else {
                // Add new
                const newId = getNextAvailableId();
                itemsData.push({ id: newId, name, category, warehouse });
                itemsData.sort((a, b) => parseInt(a.id.replace('ITM-', '')) - parseInt(b.id.replace('ITM-', '')));
            }

            localStorage.setItem('it3b_items', JSON.stringify(itemsData)); 
            closeModal();
            renderTable();
        }

        function editItem(id) {
            const item = itemsData.find(i => i.id === id);
            if (item) {
                document.getElementById('editItemId').value = item.id;
                document.getElementById('itemName').value = item.name;
                document.getElementById('itemCategory').value = item.category;
                
                loadWarehouseOptions(); // Load latest warehouses!
                
                document.getElementById('itemWarehouse').value = item.warehouse;
                modalTitle.innerText = "Edit Item";
                modal.style.display = 'flex';
            }
        }

        function deleteItem(id) {
            if (confirm("Are you sure you want to delete this item?")) {
                itemsData = itemsData.filter(i => i.id !== id);
                localStorage.setItem('it3b_items', JSON.stringify(itemsData));
                renderTable();
            }
        }

        // --- 5. Simple Search Filter ---
        function filterTable() {
            const filter = document.getElementById('searchInput').value.toUpperCase();
            const rows = document.getElementById('itemsTableBody').getElementsByTagName('tr');
            for (let i = 0; i < rows.length; i++) {
                const textValue = rows[i].textContent || rows[i].innerText;
                rows[i].style.display = textValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }

        // Initial Load
        renderTable();
    </script>
</body>
</html>
