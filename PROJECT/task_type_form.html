<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Type Form - IT3B Inc.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../universal.css" />
    <style>
        :root {
            --primary-color: #2563eb;
            --sidebar-bg: #1e293b;
            --bg-color: #badcfd;
            --text-dark: #1e293b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
        }

        .logo-area {
            padding: 2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-icon {
            width: 35px;
            height: 35px;
            background: white;
            color: var(--primary-color);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 1rem;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            color: white;
            background: var(--primary-color);
            border-radius: 0 50px 50px 0;
            margin-right: 1.5rem;
        }

        .main-content {
            margin-left: 280px;
            padding: 2.5rem;
            flex: 1;
        }

        .form-card {
            background: white;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: none;
            overflow: hidden;
        }

        .form-header {
            background: #f8fafc;
            padding: 2rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-outline-secondary {
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-icon"><i class="fa-solid fa-diagram-project"></i></div>
            <div>
                <h6 class="mb-0 fw-bold">IT3B Inc.</h6><small class="text-white-50">Project Management</small>
            </div>
        </div>
        <div class="py-4">
            <a href="project_dashboard.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Back to
                Dashboard</a>
            <div class="px-3 mt-4 mb-2 small text-uppercase opacity-50 fw-bold">Master Data</div>
            <a href="user_form.html" class="nav-link"><i class="fa-solid fa-user"></i> User</a>
            <a href="user_role_form.html" class="nav-link"><i class="fa-solid fa-user-shield"></i> User Role</a>
            <a href="task_type_form.html" class="nav-link active"><i class="fa-solid fa-tags"></i> Task Type</a>
            <a href="activity_type_form.html" class="nav-link"><i class="fa-solid fa-bolt"></i> Activity Type</a>
            <a href="activity_cost_rate_form.html" class="nav-link"><i class="fa-solid fa-dollar-sign"></i> Cost
                Rate</a>
            <a href="project_status_form.html" class="nav-link"><i class="fa-solid fa-circle-half-stroke"></i> Project
                Status</a>
            <a href="task_status_form.html" class="nav-link"><i class="fa-solid fa-flag"></i> Task Status</a>
            <a href="timesheet_status_form.html" class="nav-link"><i class="fa-solid fa-clock-rotate-left"></i>
                Timesheet Status</a>
        </div>
    </nav>
    <main class="main-content">
        <div class="form-card">
            <div class="form-header">
                <h4 class="fw-bold mb-1">Task Type Form</h4>
                <p class="text-muted mb-0 small">Define task categories for project work (proj_task_type).</p>
            </div>
            <div class="form-body p-4">
                <form id="mainForm" class="needs-validation" novalidate>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Task Type Name</label>
                            <input type="text" name="task_type_name" class="form-control" placeholder="e.g. Development"
                                required />
                        </div>
                    </div>
                    <div class="mt-5 d-flex justify-content-end gap-3">
                        <button type="button" class="btn btn-outline-secondary"
                            onclick="this.closest('form').reset()">Clear</button>
                        <button type="submit" class="btn btn-primary px-5 py-2">Save Task Type</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (localStorage.getItem('project_logged_in') !== 'true') window.location.href = '../login.html';
        document.getElementById('mainForm').onsubmit = function (e) {
            e.preventDefault();
            if (this.checkValidity()) { alert('Saved (UI Demo Only)'); this.reset(); }
            this.classList.add('was-validated');
        };
    </script>
</body>

</html>
