<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timesheet Line Form - IT3B Inc.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../universal.css" />
    <style>
        :root {
            --primary-color: #2563eb;
            --sidebar-bg: #1e293b;
            --bg-color: #badcfd;
            --text-dark: #1e293b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
        }

        .logo-area {
            padding: 2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-icon {
            width: 35px;
            height: 35px;
            background: white;
            color: var(--primary-color);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 1rem;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            color: white;
            background: var(--primary-color);
            border-radius: 0 50px 50px 0;
            margin-right: 1.5rem;
        }

        .main-content {
            margin-left: 280px;
            padding: 2.5rem;
            flex: 1;
        }

        .form-card {
            background: white;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: none;
            overflow: hidden;
        }

        .form-header {
            background: #1e293b;
            color: white;
            padding: 2rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-outline-secondary {
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-icon"><i class="fa-solid fa-diagram-project"></i></div>
            <div>
                <h6 class="mb-0 fw-bold">IT3B Inc.</h6><small class="text-white-50">Project Management</small>
            </div>
        </div>
        <div class="py-4">
            <a href="project_dashboard.html" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Back to
                Dashboard</a>
            <div class="px-3 mt-4 mb-2 small text-uppercase opacity-50 fw-bold">Transactions</div>
            <a href="project_form.html" class="nav-link"><i class="fa-solid fa-folder-plus"></i> Project</a>
            <a href="task_form.html" class="nav-link"><i class="fa-solid fa-list-check"></i> Task</a>
            <a href="timesheet_form.html" class="nav-link"><i class="fa-solid fa-clock"></i> Timesheet</a>
            <a href="timesheet_line_form.html" class="nav-link active"><i class="fa-solid fa-table-list"></i> Timesheet
                Line</a>
        </div>
    </nav>
    <main class="main-content">
        <div class="form-card">
            <div class="form-header">
                <h4 class="fw-bold mb-1">Timesheet Line Form</h4>
                <p class="mb-0 small opacity-75">Log daily work hours against a task (proj_timesheet_line).</p>
            </div>
            <div class="form-body p-4">
                <form id="mainForm" class="needs-validation" novalidate>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Timesheet</label>
                            <select name="timesheet_id" class="form-select" required>
                                <option value="">-- Select Timesheet --</option>
                                <option value="1">TS-001 (EMP-001, Week of 2025-01-06)</option>
                                <option value="2">TS-002 (EMP-002, Week of 2025-01-06)</option>
                                <option value="3">TS-003 (EMP-003, Week of 2025-01-13)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Task</label>
                            <select name="task_id" class="form-select" required>
                                <option value="">-- Select Task --</option>
                                <option value="1">Task #1 - PRJ-001 Development</option>
                                <option value="2">Task #2 - PRJ-001 Testing</option>
                                <option value="3">Task #3 - PRJ-002 Design</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Activity Type</label>
                            <select name="activity_type_id" class="form-select" required>
                                <option value="">-- Select Activity --</option>
                                <option value="1">Coding</option>
                                <option value="2">Code Review</option>
                                <option value="3">Testing</option>
                                <option value="4">Documentation</option>
                                <option value="5">Meeting</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Work Date</label>
                            <input type="date" name="work_date" class="form-control" required />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Hours</label>
                            <input type="number" name="hours" class="form-control" min="0.5" max="24" step="0.5"
                                placeholder="e.g. 8" required />
                        </div>
                    </div>
                    <div class="mt-5 d-flex justify-content-end gap-3">
                        <button type="button" class="btn btn-outline-secondary"
                            onclick="this.closest('form').reset()">Clear</button>
                        <button type="submit" class="btn btn-primary px-5 py-2">Save Line</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (localStorage.getItem('project_logged_in') !== 'true') window.location.href = '../login.html';
        document.getElementById('mainForm').onsubmit = function (e) {
            e.preventDefault();
            if (this.checkValidity()) { alert('Saved (UI Demo Only)'); this.reset(); }
            this.classList.add('was-validated');
        };
    </script>
</body>

</html>
