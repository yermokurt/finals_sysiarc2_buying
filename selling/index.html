<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT3B - ERP System</title>
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <!-- Login Container -->
    <!-- Login Container -->
    <div id="login-container">
        <div class="login-card">
            <!-- Left Side: Branding -->
            <div class="login-left">
                <div class="brand-logo"><i class="fas fa-cube"></i> IT3B Inc.</div>

                <!-- Center Graphic Placeholder (Optional) -->
                <div style="flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.2;">
                    <i class="fas fa-network-wired" style="font-size: 8rem;"></i>
                </div>

                <div class="hero-text">
                    <h2>Streamline Your Supply Chain.</h2>
                    <p>Access the Enterprise Edition of our SCM dashboard and manage your entire procurement lifecycle
                        in one place.</p>
                </div>
            </div>

            <!-- Right Side: Login Form -->
            <div class="login-right">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h2>Welcome Back</h2>
                    <p class="subtitle" style="margin-bottom: 0;">Please enter your details to sign in.</p>
                </div>

                <form id="login-form">
                    <div class="input-group">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Email
                            Address</label>
                        <div class="input-wrapper">
                            <i class="far fa-envelope"></i>
                            <input type="text" id="username" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label
                            style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="........" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <div class="action-buttons">
                        <button type="submit" class="btn-login-user">Sign In</button>
                        <button type="button" class="btn-outline">Login</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container">
        <!-- Global Header -->
        <header>
            <h1>IT3B Inc.</h1>
            <p>IT3B - Belen, Endaya, Olimpo, Panganiban</p>
        </header>

        <!-- Dynamic Navigation (Only for Functional Dashboard) -->
        <!-- Dynamic Navigation (Removed as per request) -->
        <!-- <nav id="main-nav" class="top-nav hidden"> ... </nav> -->

        <!-- Detailed Module Links (Image 2) -->
        <div id="detail-nav-bar" class="detail-nav hidden">
            <!-- Populated via JS -->
        </div>

        <!-- Main Content -->
        <main id="main-content" class="content-wrapper">
            <!-- Content injected via JS -->
        </main>
    </div>

    <script src="javascript.js"></script>
</body>

</html>
